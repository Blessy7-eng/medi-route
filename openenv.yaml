# OpenEnv Project Configuration
spec_version: 1
name: medi_route
type: space
runtime: python

metadata:
  name: "Medi-Route"
  version: "1.0.0"
  description: "AI-powered traffic signal control to prioritize emergency vehicles in high-density urban grids."
  authors:
    - "Blessy Ashish Waydande"
    - "Prachi Vasant Suryawanshi"
    - "Srushti Sanjay Shirale"

# Define the "Shape" of your AI's world
spec:
  observation_space:
    type: "Box"
    shape: [4]
    low: 0
    high: 20
  action_space:
    type: "Discrete"
    n: 2

# Link to Member 1's environment code
environment:
  module: "src.environment"
  class: "TrafficEnv"

# The 3 Mandatory Grader Scenarios
tasks:
  - id: "easy"
    name: "Task 1: Clear Road"
    difficulty: "easy"
    target_score: 1.0
  - id: "medium"
    name: "Task 2: Moderate Traffic"
    difficulty: "medium"
    target_score: 0.8
  - id: "hard"
    name: "Task 3: Sangli Market Jam"
    difficulty: "hard"
    target_score: 0.6

# Deployment Config (Matching your HF Space)
entrypoint: "inference.py"
app: "app:app"
port: 7860